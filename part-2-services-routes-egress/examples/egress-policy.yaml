apiVersion: k8s.ovn.org/v1
kind: EgressIP
metadata:
  name: egress-ip-vm-l3-a
spec:
  egressIPs:
  - 192.168.1.100
  namespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: udn-test2
  podSelector:
    matchLabels:
      kubevirt.io/domain: vm-l3-a

---
apiVersion: k8s.ovn.org/v1
kind: EgressFirewall
metadata:
  name: vm-l3-egress-firewall
  namespace: udn-test2
spec:
  egress:
  # Allow specific DNS destination
  - to:
      dnsName: "api.example.com"
    type: Allow
  # Allow a specific external resolver
  - to:
      cidrSelector: 8.8.8.8/32
    type: Allow
  # Keep this rule last (first-match behavior)
  - to:
      cidrSelector: 0.0.0.0/0
    type: Deny
