apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vm-l2-a-policy
  namespace: udn-test1
spec:
  podSelector:
    matchLabels:
      kubevirt.io/domain: vm-l2-a
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow SSH from vm-l2-b only
  - from:
    - podSelector:
        matchLabels:
          kubevirt.io/domain: vm-l2-b
    ports:
    - protocol: TCP
      port: 22
  # Allow HTTP from vm-l2-b only
  - from:
    - podSelector:
        matchLabels:
          kubevirt.io/domain: vm-l2-b
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow external HTTPS
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
