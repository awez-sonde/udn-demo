apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: primary-layer3-udn
  namespace: udn-test2
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-udn-test2",
      "isDefaultGateway": false,
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.100.0/24",
        "exclude": [
          "192.168.100.1-192.168.100.10"
        ]
      }
    }
