  name: udn-test2
  labels:
    k8s.ovn.org/primary-user-defined-network: ""
---
apiVersion: v1
kind: Namespace
metadata:
  name: udn-test3
  labels:
    udn-cluster: "true"
    k8s.ovn.org/primary-user-defined-network: ""
---
apiVersion: v1
kind: Namespace
metadata:
  name: udn-test4
  labels:
    udn-cluster: "true"
    k8s.ovn.org/primary-user-defined-network: ""
---
apiVersion: v1
