apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-l3-a
  namespace: udn-test2
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm-l3-a
    spec:
      domain:
        resources:
          requests:
            memory: 1Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: demo
              password: redhat
              chpasswd: { expire: false }
              ssh_pwauth: true
---
