apiVersion: k8s.ovn.org/v1
kind: ClusterUserDefinedNetwork
metadata:
  name: cluster-udn-test1
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  namespaceSelector:
    matchLabels:
      udn-cluster: "true"
  network:
    topology: Layer2
    layer2:
      role: Primary
      subnets:
        - "10.100.0.0/16"
---
apiVersion: k8s.ovn.org/v1
kind: ClusterUserDefinedNetwork
metadata:
  name: localnet-physical
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  namespaceSelector:
    matchLabels:
      udn-localnet: "true"
  network:
    topology: Localnet
    localnet:
      role: Secondary
      physicalNetworkName: localnet1
      ipam:
        lifecycle: Persistent
      subnets:
        - "192.168.1.0/24"
