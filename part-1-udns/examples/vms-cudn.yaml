apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-cudn-a
  namespace: udn-test3
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm-cudn-a
    spec:
      domain:
        resources:
          requests:
            memory: 1Gi
        devices:
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              users:
                - name: demo
                  groups: [wheel]
                  shell: /bin/bash
              chpasswd:
                expire: false
                users:
                  - name: demo
                    password: redhat
              ssh_pwauth: true
---
