apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: udn-full-validation
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/udn-demo.git
    targetRevision: main
    path: gitops/full-validation
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
